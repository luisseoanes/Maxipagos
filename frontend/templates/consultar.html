<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Crédito - MaxiPagos</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .consult-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .loan-card {
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1rem;
        }
        .quota-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #f1f5f9;
        }
    </style>
</head>
<body style="background: #f8fafc;">
    <div class="consult-container">
        <h2 style="margin-bottom: 0.5rem; text-align: center;">Consultar mi Crédito</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 2rem;">Ingrese su número de cédula para ver el estado de sus pagos.</p>
        
        <div style="display: flex; gap: 0.5rem; margin-bottom: 2rem;">
            <input type="text" id="cedula" placeholder="Número de cédula..." style="flex: 1; padding: 0.8rem; border: 1px solid var(--border); border-radius: 0.5rem;">
            <button onclick="consultar()" style="width: auto; padding: 0.8rem 1.5rem;">Consultar</button>
        </div>

        <div id="results" style="display: none;">
            <h3 id="client-name" style="margin-bottom: 1rem; color: var(--accent);"></h3>
            <div id="loans-list"></div>
        </div>
        
        <div id="error" style="display: none; color: var(--danger); text-align: center; margin-top: 1rem;">
            No se encontró ningún registro con esa cédula.
        </div>

        <p style="text-align: center; margin-top: 2rem;">
            <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Volver al inicio</a>
        </p>
    </div>

    <script>
        async function consultar() {
            const cedula = document.getElementById('cedula').value;
            const res = await fetch(`/api/public/consultar/${cedula}`);
            const resultsDiv = document.getElementById('results');
            const errorDiv = document.getElementById('error');
            
            if (res.ok) {
                const data = await res.json();
                resultsDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                document.getElementById('client-name').textContent = `Hola, ${data.name}`;
                
                const list = document.getElementById('loans-list');
                list.innerHTML = '';
                data.loans.forEach(loan => {
                    let quotasHtml = loan.quotas.map(q => `
                        <div class="quota-row">
                            <span>Cuota ${q.number} (${q.due})</span>
                            <span style="font-weight: 600; color: ${q.status === 'paid' ? 'var(--success)' : 'var(--text)'}">
                                $${q.amount.toLocaleString()} - ${q.status.toUpperCase()}
                            </span>
                        </div>
                    `).join('');
                    
                    list.innerHTML += `
                        <div class="loan-card">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                <h4 style="margin: 0;">Préstamo #${loan.id}</h4>
                                <span class="status-badge status-${loan.status}" style="font-size: 0.7rem;">${loan.status.toUpperCase()}</span>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 1.5rem; text-align: center; background: #f1f5f9; padding: 1rem; border-radius: 0.5rem;">
                                <div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted);">Total Pagado</div>
                                    <div style="font-weight: 700; color: var(--success);">$${loan.total_paid.toLocaleString()}</div>
                                </div>
                                <div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted);">A Capital</div>
                                    <div style="font-weight: 700;">$${loan.total_principal.toLocaleString()}</div>
                                </div>
                                <div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted);">A Interés</div>
                                    <div style="font-weight: 700;">$${loan.total_interest.toLocaleString()}</div>
                                </div>
                            </div>

                            <h5 style="margin-bottom: 0.5rem; font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted);">Plan de Pagos</h5>
                            <div>${quotasHtml}</div>
                        </div>
                    `;
                });
            } else {
                resultsDiv.style.display = 'none';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
